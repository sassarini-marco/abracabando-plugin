name: eval-static

# No-secret static tier — the always-on PR merge gate. Runs the full offline
# test suite (structure, manifests, schema, output_rules, mcp_preflight,
# mcp_replay, report gate) plus plugin validation. No API key, no live MCP.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r abracabando/requirements-dev.txt

      - name: Lint
        run: ruff check abracabando/bench abracabando/tests --config abracabando/ruff.toml

      - name: Run offline test suite
        run: python3 -m pytest abracabando/tests abracabando/bench -q

      - name: Validate plugin manifest
        run: |
          npm i -g @anthropic-ai/claude-code
          claude plugin validate ./abracabando
