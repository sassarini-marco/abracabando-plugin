name: Build and Release Plugin Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix if present (v0.2.1 → 0.2.1)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build plugin package
        run: |
          cd abracabando

          # Create temporary build directory
          BUILD_DIR=$(mktemp -d)
          PACKAGE_NAME="abracabando-${{ steps.version.outputs.version }}"
          PACKAGE_DIR="$BUILD_DIR/$PACKAGE_NAME"

          mkdir -p "$PACKAGE_DIR"

          # Copy plugin files (exclude tests, bench, and dev files)
          cp -r .claude-plugin "$PACKAGE_DIR/"
          cp -r skills "$PACKAGE_DIR/"
          cp -r examples "$PACKAGE_DIR/"
          cp .mcp.json "$PACKAGE_DIR/"
          cp README.md "$PACKAGE_DIR/"
          cp CHANGELOG.md "$PACKAGE_DIR/"
          cp ../LICENSE "$PACKAGE_DIR/"

          # Create zip in dist directory
          mkdir -p ../dist
          cd "$BUILD_DIR"
          zip -r "$GITHUB_WORKSPACE/dist/$PACKAGE_NAME.zip" "$PACKAGE_NAME"

          # Cleanup
          rm -rf "$BUILD_DIR"

          echo "Package created: dist/$PACKAGE_NAME.zip"
          ls -lh "$GITHUB_WORKSPACE/dist/$PACKAGE_NAME.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/abracabando-${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          generate_release_notes: true